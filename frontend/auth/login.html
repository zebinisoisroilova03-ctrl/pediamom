<!DOCTYPE html>
<html>
<head>
  <title>Login | PediaMom</title>
  <link rel="stylesheet" href="../css/style.css"> 
</head>
<body>
  <div id="authPage" style="display:none;">

  <div class="auth-page login-page">

  <h2>Login</h2>
<form id="loginForm">
  <input id="email" type="email" placeholder="Enter email address" required />
  <input id="password" type="password" placeholder="Enter password " required />
  <button type="submit">Login</button>
</form>

<a href="#" id="forgotPasswordLink">Forgot password?</a>

<div id="forgotPasswordSection" style="display:none">
  <input id="resetEmail" type="email" placeholder="Enter your email" />
  <button id="sendResetBtn">Send Reset Email</button>
  <div id="resetMessage"></div>
</div>

</div>
</div>

<script type="module" src="../js/firebase.js"></script>
<script type="module" src="../js/auth.js"></script>

</body>
</html>
